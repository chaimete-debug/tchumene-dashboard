{
  "functions": {
    "api/*.js": {
      "runtime": "@vercel/node"
    }
  },
  "rewrites": [
    {
      "source": "/api/:path*",
      "destination": "/api/:path*"
    },
    {
      "source": "/login",
      "destination": "/login.html"
    },
    {
      "source": "/(.*)",
      "destination": "/index.html"
    }
  ]
}
